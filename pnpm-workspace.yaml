packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  esbuild: true

# 统一依赖版本目录：所有包通过 "catalog:" 引用，升级版本只需改这一处
catalog:
  typescript: ^5.4.0
  vite: ^5.4.0
  vite-plugin-dts: ^4.0.0
  vitest: ^1.6.0
  eslint: ^8.57.0
  eslint-plugin-import: ^2.29.0
  eslint-config-prettier: ^9.1.0
  "@typescript-eslint/parser": ^7.0.0
  "@typescript-eslint/eslint-plugin": ^7.0.0
  dpdm: ^3.14.0
  prettier: ^3.2.0
