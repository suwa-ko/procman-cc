packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  esbuild: true
  msw: true
  puppeteer: true

# 统一依赖版本目录：所有包通过 "catalog:" 引用，升级版本只需改这一处
catalog:
  typescript: ^5.4.0
  vite: ^5.4.0
  vite-plugin-dts: ^4.0.0
  vitest: ^1.6.0
  eslint: ^8.57.0
  eslint-plugin-import: ^2.29.0
  eslint-config-prettier: ^9.1.0
  "@typescript-eslint/parser": ^7.0.0
  "@typescript-eslint/eslint-plugin": ^7.0.0
  jsdom: ^24.0.0
  dpdm: ^3.14.0
  prettier: ^3.2.0
  zod: ^3.23.0
  "@faker-js/faker": ^9.0.0
  hono: ^4.0.0
  "@hono/node-server": ^1.0.0
  tsx: ^4.0.0
  react: ^18.3.0
  react-dom: ^18.3.0
  "@types/react": ^18.3.0
  "@types/react-dom": ^18.3.0
  "@vitejs/plugin-react": ^4.3.0
  "@types/node": ^20.0.0
  msw: ^2.4.0
  "@tanstack/react-query": ^5.0.0
  antd: ^5.22.0
  "@ant-design/icons": ^5.5.0
  react-router-dom: ^6.26.0
